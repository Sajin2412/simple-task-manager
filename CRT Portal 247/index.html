<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRT Document Upload form - FY26</title>
  <meta name="theme-color" content="#48a747">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="crt-page">
    <header class="form-title">
      <h1>CRT Document Upload form - FY26</h1>
    </header>

    <section class="scene" aria-label="CRT document upload form">
      <div class="illustration" aria-hidden="true">
        <div class="person person-left">
          <span class="head"></span>
          <span class="hair"></span>
          <span class="body"></span>
          <span class="arm"></span>
          <span class="leg leg-one"></span>
          <span class="leg leg-two"></span>
          <span class="laptop"></span>
        </div>
        <div class="person person-top">
          <span class="head"></span>
          <span class="hair"></span>
          <span class="body"></span>
          <span class="arm"></span>
          <span class="laptop"></span>
        </div>
        <div class="person person-right">
          <span class="head"></span>
          <span class="hair"></span>
          <span class="body"></span>
          <span class="arm"></span>
          <span class="leg leg-one"></span>
          <span class="leg leg-two"></span>
        </div>
        <div class="ruler"></div>
        <div class="pencil"></div>
        <div class="book"></div>
        <div class="leaf leaf-one"></div>
        <div class="leaf leaf-two"></div>
      </div>

      <section class="form-card">
        <div class="progress-row">
          <span id="step-label">Step 1 of 8</span>
          <span id="required-label">Required</span>
        </div>

        <form id="crt-form" novalidate>
          <div id="question-area"></div>
        </form>

        <div class="form-nav">
          <button id="prev-button" type="button" class="nav-button">← Prev</button>
          <button id="next-button" type="button" class="nav-button">Next →</button>
        </div>
      </section>
    </section>

    <section class="submissions-panel" aria-label="Saved CRT form submissions">
      <div>
        <h2>Saved CRT Entries</h2>
        <p>Entries are saved in this browser for quick checking before final upload.</p>
      </div>
      <button id="download-button" type="button">Download CSV</button>
      <div id="submission-list" class="submission-list"></div>
      <p id="empty-state" class="empty-state">No entries saved yet.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
